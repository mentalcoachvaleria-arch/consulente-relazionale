<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #591c2f;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-circle {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      filter: blur(80px);
    }
    .circle-top { top: -150px; left: -150px; }
    .circle-bottom { bottom: -150px; right: -150px; }
    
    .login-box {
      background: white;
      width: 90%;
      max-width: 420px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
      text-align: center;
      z-index: 10;
    }
    .icon-circle {
      width: 80px;
      height: 80px;
      background: rgba(89,28,47,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      margin-bottom: 20px;
    }
    .icon-circle i { font-size: 30px; color: #591c2f; }
    h1 { font-size: 26px; margin-bottom: 8px; color: #1e293b; }
    .subtitle { color: #64748b; margin-bottom: 30px; }
    
    .google-btn {
      width: 100%;
      background: white;
      color: #1e293b;
      border: 2px solid #e2e8f0;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.25s;
    }
    .google-btn:hover {
      border-color: #591c2f;
      box-shadow: 0 8px 25px rgba(89, 28, 47, 0.15);
      transform: translateY(-2px);
    }
    .google-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .note {
      margin-top: 25px;
      font-size: 12px;
      color: #64748b;
    }
    .error-msg {
      margin-top: 15px;
      padding: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 0.875rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .home-btn {
      position: absolute;
      top: 25px;
      right: 25px;
      background: white;
      color: #591c2f;
      padding: 10px 18px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      display: flex;
      gap: 8px;
      align-items: center;
      transition: .25s;
    }
    .home-btn:hover { background: #f2f2f2; transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="bg-circle circle-top"></div>
  <div class="bg-circle circle-bottom"></div>
  
  <a href="index.html" class="home-btn">
    <i class="fa-solid fa-house"></i> Home
  </a>
  
  <div class="login-box">
    <div class="icon-circle"><i class="fa-solid fa-lock"></i></div>
    <h1>Area Riservata</h1>
    <p class="subtitle">Accedi per gestire i contenuti del sito</p>
    
    <button id="googleBtn" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Accedi con Google
    </button>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <div class="note">
      🔐 Solo gli amministratori autorizzati possono accedere.
    </div>
  </div>
  
  <script type="module" src="admin-login.js"></script>
</body>
</html>
